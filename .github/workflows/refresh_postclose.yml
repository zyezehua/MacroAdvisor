# =============================================================================
# Post-close data refresh — full universe + Treasury curve + FRED extras.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   HF_TOKEN           — Hugging Face write token for the cache dataset repo
#   STREAMLIT_API_KEY  — Streamlit Cloud management API key   (optional: reboot step)
#   STREAMLIT_APP_ID   — Streamlit Cloud app UUID             (optional: reboot step)
#
# Note: GitHub cron is UTC and does not observe US DST, so the run time drifts ~1h
# across the year. 22:00 UTC is comfortably after the US cash close in both EST/EDT.
# =============================================================================
name: Refresh (post-close, full)

on:
  schedule:
    - cron: "0 22 * * 1-5"      # 22:00 UTC, weekdays — after US close
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-py313-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-py313-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh full cache and upload to HF Hub
        run: python scripts/refresh_and_upload.py --scope full

      - name: Reboot Streamlit Cloud app
        if: ${{ secrets.STREAMLIT_APP_ID != '' }}
        continue-on-error: true
        run: |
          status=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.STREAMLIT_API_KEY }}" \
            --header "Content-Type: application/json" \
            "https://api.streamlit.io/v1/apps/${{ secrets.STREAMLIT_APP_ID }}/reboot")
          echo "Streamlit reboot HTTP $status"
