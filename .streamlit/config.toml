# Streamlit configuration for the MacroAdvisor dashboard (local + Streamlit Cloud).
# Theme: "white + sky-blue" — see macro_advisor/dashboard/theme.py for the
# full CSS + Plotly template that builds on these base colors.
[theme]
base = "light"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f6ff"
primaryColor = "#0ea5e9"
textColor = "#0f2742"
borderColor = "#cfe0f5"
linkColor = "#0284c7"
font = "sans serif"

[server]
headless = true
enableCORS = false

[browser]
gatherUsageStats = false
