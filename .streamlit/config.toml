# Streamlit configuration for the MacroAdvisor dashboard (local + Streamlit Cloud).
# Theme: "deep-space navy + neon glow" — see macro_advisor/dashboard/theme.py for the
# full CSS + Plotly template that builds on these base colors.
[theme]
base = "dark"
backgroundColor = "#172139"
secondaryBackgroundColor = "#22304f"
primaryColor = "#34dbf0"
textColor = "#eef4fc"
borderColor = "#3a4d77"
linkColor = "#34dbf0"
font = "sans serif"

[server]
headless = true
enableCORS = false

[browser]
gatherUsageStats = false
