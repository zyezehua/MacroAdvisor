# Global settings: risk budget, horizons, refresh, data-quality tolerances.
# Override locally via config/settings.local.yaml (gitignored) or in-app.

# ---------------------------------------------------------------------------
# Default risk profile — seeded for an upper-middle-income retail investor.
# Fully overridable in the dashboard.
# ---------------------------------------------------------------------------
risk_budget:
  notional_usd: 250000
  max_drawdown: 0.15          # 15%
  max_leverage: 1.0           # gross exposure / notional
  per_position_cap: 0.15      # 15% of notional
  per_asset_class_cap: 0.60   # 60% of notional
  ranking_objective: sortino  # sortino | sharpe
  ranking_secondary: sharpe
  benchmark_rfr_series: DGS3MO # FRED 3M T-bill as the hurdle

# ---------------------------------------------------------------------------
# Forecast horizons (trading days). Labels & backtest windows derive from these.
# ---------------------------------------------------------------------------
horizons:
  short:
    label: "1-5d"
    min_days: 1
    max_days: 5
  med_long:
    label: "1-3m"
    min_days: 21
    max_days: 63

# ---------------------------------------------------------------------------
# Signal library (Phase 1)
# ---------------------------------------------------------------------------
signals:
  lookback_days: 252          # trailing window for z-scores / percentile ranks (~1y)
  squash_k: 1.5               # tanh(z / k) -> [-1, 1]; larger k = gentler squash
  neutral_band: 0.10          # |score| <= this -> direction "neutral"

# ---------------------------------------------------------------------------
# Composite stress index (Phase 1)
# Fixed, documented expert weights. Components are blended in z-space (higher =
# more stress = risk-off) then mapped to 0-100. Weights renormalize over the
# components actually available at compute time. Override locally or in-app.
# ---------------------------------------------------------------------------
stress:
  weights:
    volatility: 0.25          # VIX/VXN/MOVE — fastest, most direct risk gauge
    credit: 0.20              # HY/IG spread proxy — funding/solvency stress leads equities
    rates: 0.20               # curve slope/level — policy & recession signal
    momentum: 0.15            # price trend/momentum — confirms regime
    breadth: 0.10             # participation — fragility under thin leadership
    cross_asset: 0.10         # USD strength + stock-bond correlation
  # Bands are upper edges; >stressed => "crisis". Signals are z-scored against their own
  # trailing window, so the latent mean-reverts around 0 and a *typical* market maps to a
  # level near 50 — hence "normal" straddles 50 rather than sitting at the low end.
  bands:
    calm: 30
    normal: 55
    elevated: 70
    stressed: 85
  logistic_k: 1.0             # steepness of z -> 0-100 logistic map

# ---------------------------------------------------------------------------
# Prediction + backtest (Phase 2a)
# Walk-forward OOS forecasting of per-asset forward returns and the stress path,
# with two model families (interpretable + gradient-boosted trees).
# ---------------------------------------------------------------------------
predict:
  models: [linear, gbm]         # families to train (see predict/models.py)
  direction_neutral_band: 0.005 # |fwd return| <= this -> "flat" label (per day, scaled by horizon)
  prob_threshold: 0.55          # min up/down probability to take a position in the backtest
  asset_feature_lookbacks: [21, 63, 126]   # per-asset technical windows (trading days)
  backtest:
    vol_target_annual: 0.10     # per-position annualized vol target for sizing
    max_position: 1.0           # cap on |weight| per asset (gross), before risk-budget caps
    long_only: false            # allow shorts on a "down" signal

# ---------------------------------------------------------------------------
# Recommendation / ranking (Phase 2b)
# Turns OOS forecasts into Sortino-ranked, risk-budgeted trade ideas (ETF proxies).
# ---------------------------------------------------------------------------
recommend:
  max_ideas: 10               # cap on ideas shown / sized per horizon
  require_agreement: false    # if true, only ideas where both models agree on direction qualify
  min_conviction: 0.55        # min directional split max(p_up,p_down)/(p_up+p_down) to qualify
  downside_vol_window: 63     # trailing window (days) for the Sortino-style downside vol
  min_downside_vol: 0.03      # floor on downside vol so near-cash ETFs don't get inflated scores
  exclude_symbols: [BIL]      # cash/MM proxies are not tradeable directional ideas
  payoff_otm_pct: 0.03        # strike offset for the illustrative option payoff (3% OTM)

# ---------------------------------------------------------------------------
# Refresh cadence
# ---------------------------------------------------------------------------
refresh:
  post_close:
    enabled: true
    time_local: "16:30"       # after US close; full universe + signals + backtest
    scope: full
  intraday:
    enabled: true
    interval_minutes: 60      # US session only; prices + stress + fast technicals
    scope: light
    session_start_local: "09:30"
    session_end_local: "16:00"

# ---------------------------------------------------------------------------
# Data-quality / cross-check tolerances
# ---------------------------------------------------------------------------
crosscheck:
  price_rel_tol: 0.005        # 0.5% max divergence between mirror price sources
  yield_abs_tol_bps: 12       # gross-sanity tol for Treasury-vs-CBOE-index yields;
                              # catches scaling/tenor errors, tolerates timing/sampling
  staleness_days: 4           # series with no update in N days -> stale flag
  min_history_days: 250       # below this a series is flagged thin

# ---------------------------------------------------------------------------
# Remote cache (Hugging Face Hub) — used for cloud deployment.
# A GitHub Actions cron refreshes data and uploads the cache here; the deployed
# dashboard downloads it on boot. Public dataset repo => app needs no token.
# Override the repo with the MACROADVISOR_HF_REPO env var.
# ---------------------------------------------------------------------------
remote:
  hf_repo: "zyezehua/macroadvisor-cache"
  app_cache_ttl_min: 30       # dashboard re-pulls the HF snapshot at most this often

# ---------------------------------------------------------------------------
# Storage
# ---------------------------------------------------------------------------
storage:
  root: "data"
  parquet_dir: "data/prices"
  series_dir: "data/series"
  db_path: "data/macro_advisor.sqlite"

# ---------------------------------------------------------------------------
# Backtest assumptions
# ---------------------------------------------------------------------------
backtest:
  cost_bps_per_trade: 2.0     # round-turn modeled per leg
  slippage_bps: 1.0
  walk_forward:
    train_min_days: 1260      # ~5y initial train
    test_days: 63             # ~1 quarter OOS step
    embargo_days: 5           # purge/embargo to prevent leakage
